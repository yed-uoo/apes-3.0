{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="bg-white rounded-4 shadow-sm p-4" style="max-width: 420px; width: 100%;">
        <div class="text-center mb-4">
            <h1 class="fw-bold fs-3 mb-2">Project Evaluation System</h1>
            <p class="text-muted small mb-0">Login to your account</p>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <input type="text" name="username" id="username" class="form-control form-control-lg" required>
            </div>

            <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Password</label>
                <input type="password" name="password" id="password" class="form-control form-control-lg" required>
            </div>

            {% if form.errors %}
                <div class="alert alert-danger mb-3">
                    Invalid credentials. Please try again.
                </div>
            {% endif %}

            <button class="btn btn-primary w-100 py-2 fw-semibold mt-3" type="submit">
                Login
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted small mb-0">Mini Project Management System</p>
        </div>
    </div>
</div>
{% endblock %}
