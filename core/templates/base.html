{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Evaluation System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'core/styles.css' %}" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">Project Evaluation System</a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}" class="btn btn-light btn-sm">Profile</a>
                    <span class="navbar-text text-light fw-medium">{{ user.username }}</span>
                    <form method="post" action="/logout/" class="mb-0">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm" type="submit">Logout</button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container py-5">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} shadow-sm rounded-3 px-4 py-3 mb-4">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
