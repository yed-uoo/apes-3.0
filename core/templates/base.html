{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'core/styles.css' %}" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #12141d 50%, #0a0a0f 100%);
            min-height: 100vh;
            color: #e5e7eb;
        }

        /* Ambient glow effects */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(217, 119, 6, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 1;
        }

        /* Navbar - Glassmorphic */
        .navbar {
            background: rgba(13, 15, 21, 0.7) !important;
            backdrop-filter: blur(24px) !important;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: none !important;
            padding: 1rem 0 !important;
        }

        .navbar-brand {
            font-weight: 600 !important;
            letter-spacing: 0.5px;
            color: #e5e7eb !important;
        }

        .navbar-text {
            color: #9ca3af !important;
            font-weight: 500 !important;
        }

        .btn-light {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #e5e7eb !important;
            backdrop-filter: blur(30px) !important;
            transition: all 0.3s ease !important;
        }

        .btn-light:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.2) !important;
        }

        .btn-outline-light {
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            color: #e5e7eb !important;
            background: transparent !important;
            transition: all 0.3s ease !important;
        }

        .btn-outline-light:hover {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
            color: #ffffff !important;
            box-shadow: 0 8px 32px rgba(249, 115, 22, 0.2) !important;
        }

        /* Profile and Logout button styles */
        .btn-profile {
            background: rgba(59, 130, 246, 0.15) !important;
            border: 1px solid rgba(59, 130, 246, 0.4) !important;
            color: #93c5fd !important;
            font-weight: 500 !important;
            padding: 0.5rem 1rem !important;
            border-radius: 8px !important;
            transition: all 0.3s ease !important;
        }

        .btn-profile:hover {
            background: rgba(59, 130, 246, 0.25) !important;
            border: 1px solid rgba(59, 130, 246, 0.6) !important;
            color: #bfdbfe !important;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3) !important;
            transform: translateY(-1px);
        }

        .btn-logout {
            background: rgba(239, 68, 68, 0.15) !important;
            border: 1px solid rgba(239, 68, 68, 0.4) !important;
            color: #fca5a5 !important;
            font-weight: 500 !important;
            padding: 0.5rem 1rem !important;
            border-radius: 8px !important;
            transition: all 0.3s ease !important;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.25) !important;
            border: 1px solid rgba(239, 68, 68, 0.6) !important;
            color: #fecaca !important;
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3) !important;
            transform: translateY(-1px);
        }

        .navbar-username {
            color: #d1d5db !important;
            font-weight: 500 !important;
            padding: 0 0.5rem;
            font-size: 0.95rem;
        }

        /* Alerts - Glassmorphic */
        .alert {
            background: rgba(255, 255, 255, 0.06) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(40px) !important;
            border-radius: 16px !important;
            color: #e5e7eb !important;
        }

        .alert-success {
            background: rgba(34, 197, 94, 0.1) !important;
            border: 1px solid rgba(34, 197, 94, 0.3) !important;
            color: #86efac !important;
        }

        .alert-warning {
            background: rgba(251, 146, 60, 0.1) !important;
            border: 1px solid rgba(251, 146, 60, 0.3) !important;
            color: #fed7aa !important;
        }

        .alert-danger {
            background: rgba(239, 68, 68, 0.1) !important;
            border: 1px solid rgba(239, 68, 68, 0.3) !important;
            color: #fca5a5 !important;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1) !important;
            border: 1px solid rgba(59, 130, 246, 0.3) !important;
            color: #bfdbfe !important;
        }

        .container {
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-semibold" href="/">Project Hub</a>
            <div class="d-flex align-items-center gap-3">
                {% if user.is_authenticated %}
                    <span class="navbar-username">👤 {{ user.username }}</span>
                    <a href="{% url 'profile' %}" class="btn btn-profile btn-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-circle" viewBox="0 0 16 16" style="margin-right: 0.3rem; vertical-align: text-bottom;">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                            <path fill-rule="evenodd" d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                        </svg>
                        Profile
                    </a>
                    <form method="post" action="{% url 'logout' %}" class="mb-0">
                        {% csrf_token %}
                        <button class="btn btn-logout btn-sm" type="submit">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-box-arrow-right" viewBox="0 0 16 16" style="margin-right: 0.3rem; vertical-align: text-bottom;">
                                <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0z"/>
                                <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708z"/>
                            </svg>
                            Logout
                        </button>
                    </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container py-5">
        {% if messages %}
            <div style="margin-top: 30px;">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} shadow-sm rounded-xl px-4 py-3 mb-4">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
