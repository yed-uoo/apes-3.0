{% extends "base.html" %}

{% block content %}
<style>
    .approval-title {
        color: #e5e7eb;
        font-weight: 700;
    }

    .approval-card {
        background: rgba(255, 255, 255, 0.06) !important;
        backdrop-filter: blur(40px) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 16px !important;
        color: #e5e7eb;
    }

    .approval-text {
        color: #9ca3af;
    }

    .btn-cancel {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: #e5e7eb !important;
        backdrop-filter: blur(30px) !important;
    }

    .btn-cancel:hover {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(249, 115, 22, 0.4) !important;
    }
</style>

<h3 class="mb-4 approval-title">Request Coordinator Approval</h3>

<div class="mb-4 approval-card p-4">
    <p class="approval-text">Your group is ready to request coordinator approval.</p>
    <p><strong style="color: #e5e7eb;">Group Size:</strong> <span class="approval-text">{{ group_size }} members</span></p>
</div>

<form method="post" class="approval-card p-4">
    {% csrf_token %}
    <div class="mb-3">
        <label for="coordinator_id" class="form-label" style="color: #9ca3af; font-weight: 500;">Select Coordinator</label>
        <select class="form-select" name="coordinator_id" id="coordinator_id" required>
            <option value="">Choose a coordinator...</option>
            {% for coordinator in coordinators %}
                <option value="{{ coordinator.id }}">{{ coordinator.username }} ({{ coordinator.email }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">Send Request</button>
        <a class="btn btn-cancel" href="{% url 'mini_project' %}">Cancel</a>
    </div>
</form>
{% endblock %}
