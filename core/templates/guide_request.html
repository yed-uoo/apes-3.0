{% extends "base.html" %}

{% block content %}
<style>
    .guide-form-title {
        color: #e5e7eb;
        font-weight: 700;
    }

    .guide-form-card {
        background: rgba(255, 255, 255, 0.06) !important;
        backdrop-filter: blur(40px) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        border-radius: 16px !important;
    }

    .btn-back {
        background: rgba(255, 255, 255, 0.08) !important;
        border: 1px solid rgba(255, 255, 255, 0.2) !important;
        color: #e5e7eb !important;
        backdrop-filter: blur(30px) !important;
    }

    .btn-back:hover {
        background: rgba(255, 255, 255, 0.12) !important;
        border-color: rgba(249, 115, 22, 0.4) !important;
    }

    .alert-info {
        background: rgba(59, 130, 246, 0.1) !important;
        border: 1px solid rgba(59, 130, 246, 0.3) !important;
        color: #bfdbfe !important;
    }
</style>

<h3 class="mb-4 guide-form-title">Request Guide</h3>

{% if existing_request %}
    <div class="alert alert-info">A guide request is already {{ existing_request.status }}.</div>
{% endif %}

<form method="post" class="card guide-form-card p-3">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label" style="color: #9ca3af; font-weight: 500;">Select Guide</label>
        <select class="form-select" name="guide_id" {% if existing_request %}disabled{% endif %}>
            <option value="">Choose a guide</option>
            {% for guide in guides %}
                <option value="{{ guide.id }}">{{ guide.username }} ({{ guide.email }})</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label" style="color: #9ca3af; font-weight: 500;">Message</label>
        <textarea class="form-control" name="message" rows="4" {% if existing_request %}disabled{% endif %}></textarea>
    </div>
    <button class="btn btn-primary" type="submit" {% if existing_request %}disabled{% endif %}>Send Request</button>
</form>

<div class="mt-3">
    <a class="btn btn-back" href="/mini-project/">Back to Mini Project</a>
</div>
{% endblock %}
